name: Update Stats & 3D Contribution

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&hide_border=true&theme=tokyonight&count_private=true&hide_title=true&bg_color=00000000&title_color=00D2FF&icon_color=9333EA&text_color=8B949E
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Top Languages Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&hide_border=true&theme=tokyonight&langs_count=8&hide_title=true&bg_color=00000000&title_color=00D2FF&text_color=8B949E
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # --- 3D Contribution ---
      - uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      # --- Commit ---
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/ profile-3d-contrib/
          git diff --staged --quiet || git commit -m "chore: update stats & 3d contrib"
          git pull --rebase
          git push
