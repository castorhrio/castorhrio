name: Generate Terminal GIF

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone gif-terminal scripts
        run: |
          git clone --depth 1 https://github.com/dbuzatto/gif-terminal.git /tmp/gif-terminal
          cp /tmp/gif-terminal/generate_with_stats.py .
          cp /tmp/gif-terminal/gifos_settings.toml .
          cp /tmp/gif-terminal/ansi_escape_colors.toml .
          cp -r /tmp/gif-terminal/gifos .

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq && sudo apt-get install -y ffmpeg
          pip install requests Pillow python-dotenv

      - name: Generate GIF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: python generate_with_stats.py

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output.gif
          git diff --staged --quiet || git commit -m "chore: update terminal gif"
          git pull --rebase
          git push
