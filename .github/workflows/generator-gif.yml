name: Generate Terminal GIF

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq && sudo apt-get install -y ffmpeg
          pip install github-readme-terminal requests Pillow

      - name: Generate GIF
        run: |
          python -c "
          import os, json, requests
          from github_readme_terminal import GitHubReadmeTerminal

          token = '${{ secrets.GITHUB_TOKEN }}'
          user = '${{ github.repository_owner }}'

          headers = {'Authorization': f'token {token}'}
          data = requests.get(f'https://api.github.com/users/{user}', headers=headers).json()

          g = GitHubReadmeTerminal(
              user_public_repos=data.get('public_repos', 0),
              user_followers=data.get('followers', 0),
              user_total_stars=0,
              user_total_forks=0,
              user_total_contributions=0,
              user_display_name=user
          )
          g.create_gif('output.gif')
          print('GIF generated successfully')
          "

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output.gif
          git diff --staged --quiet || git commit -m "chore: update terminal gif"
          git pull --rebase
          git push
